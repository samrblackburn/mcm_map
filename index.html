<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellite Map | GitHub Pages</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* Make the map fill the entire window */
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // 1. Initialize the map
    // [0, 0] is the center, 2 is the zoom level
    var map = L.map('map').setView([0, 0], 2);

    // 2. Add Google Satellite Tiles
    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      attribution: 'Map data ©2024 Google'
    }).addTo(map);

    // 3. Load your local GeoJSON file
    fetch('lter_locations.geojson')
      .then(function (response) {
        return response.json();
      })
      .then(function (data) {
        // Add the GeoJSON to the map
        var geojsonLayer = L.geoJSON(data, {
          // Optional: add a popup to each marker
          onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.name) {
              layer.bindPopup(feature.properties.name);
            }
          }
        }).addTo(map);

        // 4. Automatically zoom the map to fit your markers
        map.fitBounds(geojsonLayer.getBounds());
      })
      .catch(function (error) {
        console.error('Error loading the GeoJSON file:', error);
      });
  </script>
</body>

</html>
